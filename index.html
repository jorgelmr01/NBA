<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NBA Team Explorer</title>
  <meta name="description" content="Explore all 30 NBA teams and every player in league history — year by year. Stats, rosters, championships, drafts, and legends.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header"></div>
  <main id="app" class="container"></main>
  <footer class="footer container">
    <p class="muted">Built as a friendly NBA learning tool. Player photos via the official NBA headshot CDN; deep stats via a generated snapshot from stats.nba.com and the balldontlie API. For personal/educational use.</p>
  </footer>

  <!-- Optional: create js/config.js with window.NBA_CONFIG = { balldontlieKey: "..." } to enable live data. -->

  <!-- Data (registers arrays on the global NBA namespace) -->
  <script src="data/teams.js"></script>
  <script src="data/team-seasons.js"></script>
  <script src="data/meta.js"></script>
  <script src="data/seasons.js"></script>
  <script src="data/player-index.js"></script>
  <script src="data/curated.js"></script>

  <!-- Core -->
  <script src="js/util.js"></script>
  <script src="js/store.js"></script>
  <script src="js/image.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>

  <!-- Views -->
  <script src="js/views/home.js"></script>
  <script src="js/views/teams.js"></script>
  <script src="js/views/team.js"></script>
  <script src="js/views/players.js"></script>
  <script src="js/views/player.js"></script>
  <script src="js/views/games.js"></script>
  <script src="js/views/compare.js"></script>

  <!-- Bootstrap (must be last) -->
  <script src="js/app.js"></script>
</body>
</html>
